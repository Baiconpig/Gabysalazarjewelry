services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gjewelry_app
    user: "501:20"
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"

  mysql:
    image: mysql:8.4
    container_name: gjewelry_mysql
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - gjewelry_mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: gjewelry
      MYSQL_USER: gjewelry
      MYSQL_PASSWORD: gjewelry_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  gjewelry_mysql_data:
